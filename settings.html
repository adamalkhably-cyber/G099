<!DOCTYPE html>

<script>
// 1. THE THEME FIX (Runs instantly)
  // This sits outside the DOMContentLoaded block so it applies the dark theme 
  // immediately, preventing that bright white flash when you change pages!
  (function() {
    const savedTheme = localStorage.getItem("theme") || localStorage.getItem("wardrobe-theme");
    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();

  // 2. THE PROFILE FIX (Runs after the page loads)
  // This waits for the HTML to be fully drawn on the screen before trying to 
  // find the sidebar elements and injecting your username/image into them.
document.addEventListener("DOMContentLoaded", () => {
    const usernameInput = document.getElementById("username");
    const themeSelect = document.getElementById("theme");
    const imageUpload = document.getElementById("profile-upload"); // New image input
    const fileChosenText = document.getElementById("file-chosen");

    // Update the text when a file is selected
    if (imageUpload && fileChosenText) {
        imageUpload.addEventListener("change", function() {
            if (this.files && this.files.length > 0) {
                fileChosenText.textContent = this.files[0].name; // Shows the image file name
            } else {
                fileChosenText.textContent = "No file chosen";
            }
        });
    }

    const sidebarUsername = document.getElementById("sidebar-username");
    const sidebarAvatar = document.getElementById("sidebar-avatar");
    const sidebarAvatarImg = document.getElementById("sidebar-avatar-img"); // New image tag
    
    const THEME_KEY = "wardrobe-theme";
    const IMAGE_KEY = "profile-image"; // Storage key for the picture

    function applyTheme(theme) {
        if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        } else {
            document.documentElement.removeAttribute("data-theme");
        }
    }

    function updateSidebarProfile(name, imageData) {
        if (name && sidebarUsername) {
            sidebarUsername.textContent = name;
        }
        
        if (imageData && sidebarAvatarImg) {
            // If an image exists, show the image and hide the initials
            sidebarAvatarImg.src = imageData;
            sidebarAvatarImg.style.display = "block";
            if (sidebarAvatar) sidebarAvatar.style.display = "none";
        } else if (name && sidebarAvatar) {
            // If no image, show the initials and hide the image tag
            const initials = name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
            sidebarAvatar.textContent = initials || "??";
            sidebarAvatar.style.display = "block";
            if (sidebarAvatarImg) sidebarAvatarImg.style.display = "none";
        }
    }

    // 1. Load saved settings
    const savedUsername = localStorage.getItem("username") || "Haziq";
    const savedTheme = localStorage.getItem(THEME_KEY) || "default";
    const savedImage = localStorage.getItem(IMAGE_KEY); // Get saved image

    if (usernameInput) usernameInput.value = savedUsername;
    if (themeSelect) themeSelect.value = savedTheme;

    applyTheme(savedTheme);
    updateSidebarProfile(savedUsername, savedImage);

    if (themeSelect) {
        themeSelect.addEventListener("change", (e) => {
            applyTheme(e.target.value);
        });
    }

    // 2. Save settings (including the new image)
    const preferencesForm = document.querySelector("form");
    if (preferencesForm) {
        preferencesForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const newName = usernameInput ? usernameInput.value : "";
            localStorage.setItem("username", newName);
            if (themeSelect) localStorage.setItem(THEME_KEY, themeSelect.value);

            // Handle Image Upload saving
            if (imageUpload && imageUpload.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Image = event.target.result;
                    localStorage.setItem(IMAGE_KEY, base64Image); // Save to browser
                    updateSidebarProfile(newName, base64Image); // Update UI
                    alert("Settings & Profile Picture Saved!");
                };
                reader.readAsDataURL(imageUpload.files[0]); // Convert file to base64
            } else {
                // If no new image was uploaded, just update the name and keep existing image
                updateSidebarProfile(newName, localStorage.getItem(IMAGE_KEY));
                alert("Settings Saved!");
            }

            if (themeSelect) applyTheme(themeSelect.value);
        });
    }
});
</script>

    <!-- MAIN -->

        <!-- User Preferences Panel -->
        <div class="panel">

            <form>
              <div style="margin-bottom:1rem;">
                <label for="username" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Display Name</label>
                <input type="text" id="username" name="username" placeholder="Enter your name" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
              </div>

            <div style="margin-bottom:1rem;">
    <label style="display:block; font-size:0.85rem; color:#e6f7f5; margin-bottom:0.4rem;">Profile Picture</label>
    
    <div class="file-upload-wrapper">
        <input type="file" id="profile-upload" accept="image/png, image/jpeg, image/jpg" class="hidden-file-input">
        
        <label for="profile-upload" class="custom-file-button">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload Image
        </label>
        
        <span id="file-chosen" class="file-chosen-text">No file chosen</span>
    </div>
</div>

              <div style="margin-bottom:1rem;">
                <label for="theme" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Theme</label>
                <select id="theme" name="theme" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
                  <option value="default">Default</option>
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>

              <div style="margin-bottom:1rem;">
                <label style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Notifications</label>
                <div>
                  <input type="checkbox" id="emailNotif" name="notifications" value="email">
                  <label for="emailNotif"> Email Alerts</label>
                </div>
                <div>
                  <input type="checkbox" id="pushNotif" name="notifications" value="push">
                  <label for="pushNotif"> Push Notifications</label>
                </div>
              </div>

              <button type="submit" class="btn-add">Save Settings</button>
            </form>
          </div>
        </div>

      <!-- Settings Form -->
      <div class="content" style="margin-top:2rem;">
