<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outfit Planner</title>
  <link rel="stylesheet" href="theme.css">
 <script>
  // 1. THE THEME FIX (Runs instantly)
  // This sits outside the DOMContentLoaded block so it applies the dark theme 
  // immediately, preventing that bright white flash when you change pages!
  (function() {
    const savedTheme = localStorage.getItem("theme") || localStorage.getItem("wardrobe-theme");
    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();

  // 2. THE PROFILE FIX (Runs after the page loads)
  // This waits for the HTML to be fully drawn on the screen before trying to 
  // find the sidebar elements and injecting your username/image into them.
  document.addEventListener("DOMContentLoaded", () => {
    const savedUsername = localStorage.getItem("username");
    const savedImage = localStorage.getItem("profile-image");
    const sidebarUsername = document.getElementById("sidebar-username");
    const sidebarAvatar = document.getElementById("sidebar-avatar");
    const sidebarAvatarImg = document.getElementById("sidebar-avatar-img");

    if (savedUsername && sidebarUsername) {
      sidebarUsername.textContent = savedUsername;
    }
    
    if (savedImage && sidebarAvatarImg) {
        sidebarAvatarImg.src = savedImage;
        sidebarAvatarImg.style.display = "block";
        if (sidebarAvatar) sidebarAvatar.style.display = "none";
    } else if (savedUsername && sidebarAvatar) {
        const initials = savedUsername.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
        sidebarAvatar.textContent = initials;
    }
  });

    // Wait for the page to fully load before running the script
    document.addEventListener('DOMContentLoaded', function() {
        displaySavedOutfits();
    });

  function displaySavedOutfits() {
    const plannerGrid = document.getElementById('planner-grid');
    if (!plannerGrid) return; 

    const savedOutfits = JSON.parse(localStorage.getItem('savedOutfits')) || [];
    plannerGrid.innerHTML = ""; 

    if (savedOutfits.length === 0) {
        plannerGrid.innerHTML = "<p style='color: var(--text-on-exterior);'>Your planner is empty!</p>";
        return;
    }

    // 1. THE IMAGE DICTIONARY 
    // This tells the code exactly which file to use for which item.
    const imageDictionary = {
        "Casual T-Shirt": "shirt.png",
        "Denim Jeans": "jeans.png",
        "Leather Jacket": "jacket.png",
        "White Sneakers": "white-sneakers.png",
        "Summer Dress": "linen-slip-dress.png",
        "Wool Overcoat": "wool-overcoat.png",
        "Striped Oxford": "striped-oxford.png",
        "Strappy Sandals": "strappy-sandals.png",
        "Skirt": "skirt.png",
        "Hoodie": "hoodie.png",
        "Cashmere Scarf": "cashmere-scarf.png",
        "Leather Tote": "leather-tote.png",
        "Loafers": "loafers.png",
        "Accessories": "accessories.png"
    };

    savedOutfits.forEach((outfit, index) => {
        const card = document.createElement('div');
        card.className = 'outfit-card'; 

        // 2. DYNAMICALLY CREATE IMAGES USING THE DICTIONARY
        let imagesHtml = outfit.items.map(item => {
            
            // Look up the file in the dictionary. 
            // If it's not there (like your Coastal Office items), it guesses by replacing spaces with dashes.
            let fileName = imageDictionary[item];
            if (!fileName) {
                fileName = item.toLowerCase().replace(/ /g, '-') + '.png';
            }

            return `<img src="assets/images/${fileName}" 
                         alt="${item}" 
                         style="width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: var(--interior-soft);">`;
        }).join('');

        // 3. BUILD THE CARD
        card.innerHTML = `
            <div style="padding: 16px;">
                <h3 style="margin: 0 0 10px 0; color: var(--text-on-exterior);">${outfit.name}</h3>
                
                <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
                    ${imagesHtml}
                </div>

                <p style="color: var(--interior-light); font-size: 13px;"><strong>Items:</strong> ${outfit.items.join(', ')}</p>
                
                <button onclick="removeOutfit(${index})" class="aesthetic-remove-btn">
                    Remove
                </button>
            </div>
        `;
        
        plannerGrid.appendChild(card);
    });
}

    // --- Remove Outfit Function (Global) ---
    window.removeOutfit = function(index) {
        // Get the list, remove the specific item, save the list, and refresh the grid
        let savedOutfits = JSON.parse(localStorage.getItem('savedOutfits')) || [];
        savedOutfits.splice(index, 1); 
        localStorage.setItem('savedOutfits', JSON.stringify(savedOutfits));
        
        displaySavedOutfits(); // Instantly update the page without needing a refresh
    };
</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
