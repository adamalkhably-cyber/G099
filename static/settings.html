  <div class="sidebar-spacer"></div>

<div class="sidebar-profile">
    <div class="avatar-container">
        <!-- The image tag (hidden by default until a picture is uploaded) -->
        <img id="sidebar-avatar-img" src="" alt="Profile" style="display: none;">
        <!-- The initials fallback -->
        <div class="avatar" id="sidebar-avatar">H</div>
    </div>
    <div class="profile-info">
        <span class="profile-name" id="sidebar-username">Haziq</span>
        <span class="profile-plan">Pro Plan</span>
    </div>
</div>
</aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">Settings</div>
      </header>

      <div class="content">
        <!-- User Preferences Panel -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">User Preferences</span>
          </div>
          <div style="padding:1.25rem;">
            <form>
              <div style="margin-bottom:1rem;">
                <label for="username" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Display Name</label>
                <input type="text" id="username" name="username" placeholder="Enter your name" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
              </div>

            <div style="margin-bottom:1rem;">
    <label style="display:block; font-size:0.85rem; color:#e6f7f5; margin-bottom:0.4rem;">Profile Picture</label>
    
    <div class="file-upload-wrapper">
        <input type="file" id="profile-upload" accept="image/png, image/jpeg, image/jpg" class="hidden-file-input">
        
        <label for="profile-upload" class="custom-file-button">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload Image
        </label>
        
        <span id="file-chosen" class="file-chosen-text">No file chosen</span>
    </div>
</div>

              <div style="margin-bottom:1rem;">
                <label for="theme" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Theme</label>
                <select id="theme" name="theme" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
                  <option value="default">Default</option>
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>

              <div style="margin-bottom:1rem;">
                <label style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Notifications</label>
                <div>
                  <input type="checkbox" id="emailNotif" name="notifications" value="email">
                  <label for="emailNotif"> Email Alerts</label>
                </div>
                <div>
                  <input type="checkbox" id="pushNotif" name="notifications" value="push">
                  <label for="pushNotif"> Push Notifications</label>
                </div>
              </div>

              <button type="submit" class="btn-add">Save Settings</button>
            </form>
          </div>
        </div>

      <!-- Settings Form -->
      <div class="content" style="margin-top:2rem;">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Privacy & Security</span>
          </div>
          <div style="padding:1.25rem;">
            <form>
              <div style="margin-bottom:1rem;">
                <label for="password" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Change Password</label>
                <input type="password" id="password" name="password" placeholder="New Password" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
              </div>

              <div style="margin-bottom:1rem;">
                <label for="email" style="display:block; font-size:0.85rem; color:#033f3f; margin-bottom:0.4rem;">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" style="width:100%; padding:0.5rem; border:1px solid rgba(4,93,93,0.2); border-radius:6px;">
              </div>

              <button type="submit" class="btn-add">Update Account</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
