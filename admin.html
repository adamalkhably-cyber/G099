<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
  /* Copy theme variables from dashboard */
  :root {
    --exterior: #045D5D;
    --exterior-dark: #033f3f;
    --exterior-light: #056b6b;
    --interior: #81cdc6;
    --interior-light: #a8ddd8;
    --interior-pale: #e4f5f3;
    --interior-soft: #c2e9e6;
    --text-on-exterior: #e4f5f3;
    --text-on-interior: #033f3f;
    --white: #ffffff;
    --shadow-subtle: rgba(4, 93, 93, 0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--exterior-dark);
    color: var(--text-on-exterior);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .login-box {
    background: var(--white);
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 8px 20px var(--shadow-subtle);
    width: 320px;
  }

  .login-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--exterior);
    margin-bottom: 1.2rem;
    text-align: center;
  }

  .login-box input {
    width: 100%;
    padding: 0.6rem;
    margin-bottom: 1rem;
    border: 1px solid var(--shadow-subtle);
    border-radius: 6px;
    background: var(--interior-pale);
    font-size: 0.9rem;
    color: var(--exterior);
  }

  .login-box button {
    width: 100%;
    padding: 0.7rem;
    background: var(--exterior);
    color: var(--interior-light);
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-box button:hover {
    background: var(--exterior-light);
  }
</style>
</head>
<body>
  <div class="login-box">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
